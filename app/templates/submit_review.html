<!-- Submit Review: Page for submitting a new course review -->
{% extends "base.html" %}

{% block title %}Submit Review | CSPB Course Reviews{% endblock %}

{% block content %}

<section=description>
    <h2>Submit Review</h2>
    <p>
        This is the submit review page for course: {{ course.name }}.
    </p>
</section>

<div>
    <form method="post" action="{{url_for('submit_review', course_id=course_id)}}">
        
        <!--inputs-->

        <div>
            <label for="rating">Course rating 1-5</label>
            <input type="number" id="rating" name="rating" min="1" max="5" required>
        </div>

        <div>
            <label for="difficulty">Perceived course difficulty 1-5</label>
            <input type="number" id="difficulty" name="difficulty" min="1" max="5" required>
        </div>
        
        <div>
            <label for="time">Time commitment per week</label>
            <input type="number" id="time" name="time" min="0" max="30" required>
        </div>

        <div>        
            <label for="review">Leave a review (300 character max.)</label>
            <textarea id="review" name="review_text" maxlength=300 rows="5" required></textarea>

        </div>

        <div>
            <label for="year">Year class was taken (YYYY)</label>
            <input type="text" id="year" name="year" pattern="[0-9]{4}" maxlength="4" inputmode="numeric" required>
        </div>

        <div>
            <label for="semester">Semester</label>
            <select id="semester" name="semester" required>
                <option value="" disabled selected>Select a semester</option>
                <option value="Spring">Spring</option>
                <option value="Summer">Summer</option>
                <option value="Fall">Fall</option>
            </select>
        </div>

        <button type="submit">Submit Review</button>

    </form>
</div>

{% endblock %}
